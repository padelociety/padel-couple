<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="부부매치">
<meta name="theme-color" content="#0a2f24">
<title>부부매치 · Padel Society</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<script>if("serviceWorker" in navigator){addEventListener("load",function(){navigator.serviceWorker.register("sw.js").catch(function(){})})}</script>
<style>
  :root{
    --bg-1:#0a2f24; --bg-2:#0d4433; --bg-3:#0f5240;
    --panel:rgba(255,255,255,.05); --panel-2:rgba(255,255,255,.09);
    --line:rgba(212,175,55,.35); --line-soft:rgba(255,255,255,.12);
    --gold:#d4af37; --gold-2:#e8c66a; --cream:#f5edd8; --dim:rgba(245,237,216,.6);
    --ok:#7ed491; --warn:#e8a06a;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    font-family:"Pretendard","Noto Sans KR","Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;
    background:radial-gradient(120% 90% at 50% 0%, var(--bg-3) 0%, var(--bg-2) 45%, var(--bg-1) 100%);
    color:var(--cream); min-height:100dvh;
  }
  button{font-family:inherit;color:inherit;background:none;border:none;cursor:pointer}
  input{font-family:inherit}

  /* ===== 공통 헤더 ===== */
  .wrap{max-width:560px;margin:0 auto;padding:16px 14px 90px}
  header{text-align:center;padding:10px 0 6px}
  .logo{width:128px;max-width:42%;display:block;margin:0 auto 6px;opacity:.96}
  .title{font-size:clamp(26px,7vw,34px);font-weight:800;color:var(--gold-2);letter-spacing:6px}
  .subtitle{font-size:clamp(10px,2.8vw,13px);letter-spacing:4px;color:var(--gold);margin-top:4px;font-weight:600}
  .rings{color:var(--gold);opacity:.85;font-size:15px;margin-top:2px}

  .statusbar{display:flex;justify-content:center;gap:8px;margin:10px 0 4px;flex-wrap:wrap}
  .pill{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:999px;
    padding:5px 12px;font-size:12px;color:var(--cream);background:var(--panel)}
  .dot{width:8px;height:8px;border-radius:50%;background:#888;flex:none}
  .dot.on{background:var(--ok);box-shadow:0 0 6px var(--ok)}
  .dot.off{background:#999}

  .modeswitch{display:flex;justify-content:center;gap:7px;margin:10px 0;flex-wrap:wrap}
  .modeswitch button{border:1px solid var(--line);border-radius:10px;padding:8px 13px;font-size:13px;font-weight:700;
    color:var(--dim);background:var(--panel)}
  .modeswitch button.active{color:#153726;background:var(--gold-2);border-color:var(--gold-2)}

  /* ===== 순위표 ===== */
  .card{background:var(--panel);border:1px solid var(--line-soft);border-radius:16px;padding:14px;margin:12px 0}
  .card h2{font-size:13px;letter-spacing:3px;color:var(--gold);font-weight:700;margin-bottom:10px;text-align:center}
  .standwrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
  table{width:100%;border-collapse:collapse;min-width:360px}
  th{font-size:11px;color:var(--dim);font-weight:600;padding:5px 4px;text-align:center;white-space:nowrap}
  td{padding:9px 4px;text-align:center;font-size:14px;border-top:1px solid var(--line-soft);white-space:nowrap}
  td.teamcell{text-align:left;white-space:nowrap;padding-left:6px;font-size:13.5px}
  .chip{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:6px;vertical-align:1px}
  .rank1 td{color:var(--gold-2);font-weight:800}
  .mp{font-weight:800;color:var(--gold-2)}
  .gd-pos{color:var(--ok)}
  .gd-neg{color:var(--warn)}

  /* ===== 가짜부부 링크 ===== */
  .navlink{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;margin:6px 0 0;
    padding:15px;border:1px solid var(--line);border-radius:14px;background:var(--panel);
    color:var(--gold-2);font-size:15px;font-weight:700;text-decoration:none}
  .navlink:active{background:var(--panel-2)}
  .navlink small{color:var(--dim);font-weight:500;font-size:12px}

  /* ===== 경기 리스트 ===== */
  .match{display:flex;align-items:center;gap:8px;background:var(--panel);border:1px solid var(--line-soft);
    border-radius:14px;padding:12px 12px;margin:8px 0;width:100%}
  .match.done{background:rgba(212,175,55,.07);border-color:var(--line)}
  .match.now{border-color:var(--gold-2);box-shadow:0 0 12px rgba(212,175,55,.25)}
  .mno{width:30px;height:30px;border:1.5px solid var(--gold);border-radius:50%;color:var(--gold-2);
    font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex:none}
  .mteams{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;min-width:0}
  .tname{border:1.5px solid;border-radius:999px;padding:5px 10px;font-size:14px;font-weight:600;white-space:nowrap}
  .vs{color:var(--gold);font-size:11px}
  .mscore{width:64px;text-align:center;font-size:17px;font-weight:800;color:var(--gold-2);flex:none}
  .mscore .empty{color:var(--dim);font-size:12px;font-weight:500}
  .winner{text-shadow:0 0 8px rgba(212,175,55,.6)}

  /* ===== 점수 입력 시트 ===== */
  .sheet-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;z-index:50}
  .sheet-bg.open{display:block}
  .sheet{position:fixed;left:0;right:0;bottom:0;z-index:51;transform:translateY(105%);transition:transform .2s ease;
    background:linear-gradient(180deg,#0f4a38,#0a2f24);border-top:1.5px solid var(--gold);
    border-radius:20px 20px 0 0;padding:18px 16px calc(20px + env(safe-area-inset-bottom));max-width:560px;margin:0 auto}
  .sheet.open{transform:translateY(0)}
  .sheet h3{text-align:center;font-size:13px;color:var(--gold);letter-spacing:2px;margin-bottom:14px}
  .scorerow{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:10px 0}
  .scorerow .tname{flex:1;text-align:center;font-size:15px}
  .stepper{display:flex;align-items:center;gap:6px}
  .stepper button{width:46px;height:46px;border-radius:12px;border:1px solid var(--line);background:var(--panel-2);
    font-size:24px;font-weight:700;color:var(--cream)}
  .stepper button:active{background:var(--gold-2);color:#153726}
  .snum{width:56px;height:46px;text-align:center;font-size:26px;font-weight:800;color:var(--gold-2);
    background:transparent;border:none;outline:none}
  .sumline{text-align:center;font-size:13px;margin:8px 0;color:var(--dim)}
  .sumline .bad{color:var(--warn);font-weight:700}
  .sumline .good{color:var(--ok);font-weight:700}
  .linkbtn{font-size:12px;border:1px solid var(--line);border-radius:999px;padding:4px 12px;color:var(--dim);margin-left:8px}
  .linkbtn.on{color:#153726;background:var(--gold-2);border-color:var(--gold-2)}
  .sheetbtns{display:flex;gap:10px;margin-top:14px}
  .sheetbtns button{flex:1;padding:14px;border-radius:12px;font-size:16px;font-weight:800}
  .btn-save{background:var(--gold-2);color:#153726}
  .btn-del{background:rgba(224,120,100,.2);color:#e8a08c;border:1px solid rgba(224,120,100,.4)!important;flex:0 0 auto;padding:14px 16px!important}
  .btn-cancel{background:var(--panel-2);color:var(--dim);border:1px solid var(--line-soft)!important}

  /* ===== 설정 ===== */
  .gear{position:fixed;right:14px;bottom:calc(14px + env(safe-area-inset-bottom));z-index:40;width:46px;height:46px;
    border-radius:50%;background:var(--panel-2);border:1px solid var(--line);font-size:20px;backdrop-filter:blur(6px)}
  .settings .row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:14px 0;font-size:14px}
  .settings input[type=text],.settings input[type=number]{background:var(--panel-2);border:1px solid var(--line);
    border-radius:10px;color:var(--cream);padding:10px;font-size:15px;width:120px;text-align:center;outline:none}
  .btn-danger{width:100%;margin-top:8px;padding:13px;border-radius:12px;font-weight:700;font-size:14px;
    background:rgba(224,120,100,.15);color:#e8a08c;border:1px solid rgba(224,120,100,.4)}

  footer{text-align:center;letter-spacing:5px;font-size:11px;color:var(--dim);padding:20px 0 8px}

  /* ============ TV 모드 ============ */
  body.tv{overflow:hidden}
  .tvwrap{display:none}
  body.tv .wrap,body.tv .gear{display:none}
  body.tv .tvwrap{display:flex;flex-direction:column;height:100dvh;padding:2.2vh 3vw;max-width:none}
  .tvhead{display:flex;align-items:center;justify-content:center;gap:1.6vw;flex:none}
  .tvlogo{height:6vh;opacity:.95}
  .tvhead .title{font-size:4.6vh;letter-spacing:1vh}
  .tvhead .subtitle{font-size:1.9vh;letter-spacing:.5vh}
  .tvprogress{flex:none;display:flex;align-items:center;gap:1.5vw;margin:1.2vh 0}
  .pbar{flex:1;height:.8vh;background:var(--panel-2);border-radius:99px;overflow:hidden}
  .pbar>div{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-2));border-radius:99px;transition:width .5s}
  .ptext{font-size:1.8vh;color:var(--dim);flex:none}
  .tvgrid{flex:1;display:grid;grid-template-columns:11fr 9fr;gap:2vw;min-height:0}
  .tvpanel{background:var(--panel);border:1px solid var(--line-soft);border-radius:1.5vh;padding:2vh 1.6vw;
    display:flex;flex-direction:column;min-height:0}
  .tvpanel h2{font-size:2vh;letter-spacing:.6vh;color:var(--gold);text-align:center;margin-bottom:1.4vh;flex:none}
  .tvstand{flex:1;display:flex;flex-direction:column;justify-content:center;gap:.3vh;min-height:0}
  .tvsrow{display:grid;grid-template-columns:5vh minmax(0,1.6fr) repeat(7, minmax(0,1fr));
    align-items:center;gap:.3vw;font-size:2.7vh;padding:.7vh .5vw;border-radius:1vh}
  .tvsrow>span{text-align:center;white-space:nowrap;overflow:hidden}
  .tvsrow .rk{width:4.5vh;height:4.5vh;justify-self:start;border-radius:50%;border:.3vh solid var(--line);
    display:flex;align-items:center;justify-content:center;font-size:2.1vh;font-weight:800;color:var(--gold-2)}
  .tvsrow .nm{text-align:left;font-weight:700;display:flex;align-items:center}
  .tvsrow .nm .chip{width:1.6vh;height:1.6vh;margin-right:.6vw;flex:none}
  .tvsrow .mp{color:var(--gold-2);font-weight:800}
  .tvsrow.head{font-size:1.65vh;color:var(--dim);padding:.3vh .5vw;border-bottom:1px solid var(--line-soft)}
  .tvsrow.head .mp{color:var(--gold)}
  .tvsrow.r1{background:rgba(212,175,55,.12)}
  .tvsrow.r1 .rk{background:var(--gold-2);color:#153726;border-color:var(--gold-2)}
  .tvsrow.r1 .nm{color:var(--gold-2)}
  .tvsrow .gd-pos{color:var(--ok)}
  .tvsrow .gd-neg{color:var(--warn)}
  .tvright{display:flex;flex-direction:column;gap:1.6vh;min-height:0}
  .tvnow{flex:none;text-align:center;padding:2.4vh 1.6vw}
  .tvnow .label{font-size:1.8vh;letter-spacing:.5vh;color:var(--gold);margin-bottom:1.6vh}
  .tvnow .teams{display:flex;align-items:center;justify-content:center;gap:1.2vw}
  .tvnow .tname{font-size:2.9vh;padding:1.2vh 1.6vw;border-width:.35vh}
  .tvnow .vs{font-size:2vh}
  .tvnow .mn{margin-top:1.4vh;font-size:1.8vh;color:var(--dim)}
  .champ{font-size:3.6vh;font-weight:800;color:var(--gold-2);line-height:1.5}
  .champ small{display:block;font-size:1.8vh;letter-spacing:.5vh;color:var(--gold);font-weight:600}
  .tvnext{flex:1;overflow:hidden}
  .tvnext .item{display:flex;align-items:center;gap:.8vw;font-size:2vh;padding:.9vh .4vw;border-top:1px solid var(--line-soft)}
  .tvnext .item:first-child{border-top:none}
  .tvnext .no{color:var(--gold-2);font-weight:700;width:3.4vh;flex:none}
  .tvnext .t{flex:1;text-align:center;white-space:nowrap;overflow:hidden}
  .tvnext .sc{font-weight:800;color:var(--gold-2);width:8vh;text-align:right;flex:none}
  .tvfoot{flex:none;display:flex;align-items:center;justify-content:space-between;gap:2vw;
    font-size:1.6vh;color:var(--dim);padding-top:1.4vh}
  .tvfoot .brand{letter-spacing:.8vh}
  .tvsync{display:inline-flex;align-items:center;gap:.7vw;white-space:nowrap}
  .tvdot{width:1.2vh;height:1.2vh;border-radius:50%;background:#999;flex:none}
  .tvdot.on{background:var(--ok);box-shadow:0 0 1vh var(--ok)}
  .tvdot.off{background:var(--warn)}
  #tvUpdated{color:var(--gold-2);white-space:nowrap;min-width:11vw;text-align:right}

  /* ===== TV 통합(스케줄) 모드 ===== */
  body.tv-sched .tvgrid{grid-template-columns:9fr 7fr 6fr}
  .tvsched{display:none}
  body.tv-sched .tvsched{display:flex}
  .tvschedlist{flex:1;display:flex;flex-direction:column;justify-content:space-evenly;min-height:0}
  .tvsi{display:flex;gap:.8vw;align-items:center;padding:.4vh .6vw;border-radius:1vh}
  .tvsi .tm{flex:none;background:var(--panel-2);color:var(--gold-2);font-weight:800;font-size:1.7vh;
    border-radius:.7vh;padding:.6vh 0;min-width:5.4vw;text-align:center}
  .tvsi .bd{flex:1;min-width:0}
  .tvsi .tt{font-size:2vh;font-weight:700;color:var(--cream);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tvsi .td{font-size:1.5vh;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tvsi.past{opacity:.4}
  .tvsi.now{background:rgba(212,175,55,.12)}
  .tvsi.now .tm{background:var(--gold-2);color:#153726}
  .tvsi.now .tt{color:var(--gold-2)}
</style>
</head>
<body>

<!-- ================= 컨트롤(폰) 모드 ================= -->
<div class="wrap">
  <header>
    <img class="logo" src="logo.png" alt="Padel Society">
    <div class="title">부부매치</div>
    <div class="subtitle">ROUND ROBIN · AMERICANO</div>
  </header>

  <div class="statusbar">
    <span class="pill"><span class="dot" id="syncDot"></span><span id="syncText">연결 중…</span></span>
    <span class="pill">🏓 <span id="progText">0 / 15 완료</span></span>
  </div>

  <div class="modeswitch">
    <button data-mode="input" class="active" onclick="setMode('input')">✏️ 입력</button>
    <button data-mode="score" onclick="setMode('score')">📺 스코어보드</button>
    <button data-mode="full" onclick="setMode('full')">📋 +스케줄</button>
  </div>

  <div class="card">
    <h2>순위표</h2>
    <div class="standwrap"><table id="standTable"></table></div>
  </div>

  <div id="matchList"></div>

  <a class="navlink" id="infoLink" href="info.html">📋 안내 · 스케줄 &nbsp;<small>타임라인 · 정산</small></a>
  <a class="navlink" id="partnerLink" href="partner.html">💞 가짜부부 선정 &nbsp;<small>부부매치 끝나고 →</small></a>

  <footer>PADEL SOCIETY</footer>
</div>

<!-- ================= TV 모드 ================= -->
<div class="tvwrap">
  <div class="tvhead">
    <img class="tvlogo" src="logo.png" alt="">
    <div class="title">부부매치</div>
    <div class="subtitle">ROUND ROBIN · AMERICANO</div>
  </div>
  <div class="tvprogress">
    <span class="ptext" id="tvProgLeft">0 / 15 경기</span>
    <div class="pbar"><div id="tvProgBar" style="width:0%"></div></div>
    <span class="ptext" id="tvClock"></span>
  </div>
  <div class="tvgrid">
    <div class="tvpanel">
      <h2>순위표</h2>
      <div class="tvstand" id="tvStand"></div>
    </div>
    <div class="tvright">
      <div class="tvpanel tvnow" id="tvNow"></div>
      <div class="tvpanel tvnext">
        <h2>경기 결과 · 예정</h2>
        <div id="tvList" style="overflow:hidden;flex:1"></div>
      </div>
    </div>
    <div class="tvpanel tvsched">
      <h2>SCHEDULE</h2>
      <div class="tvschedlist" id="tvSchedList"></div>
    </div>
  </div>
  <div class="tvfoot">
    <span class="tvsync"><span class="tvdot" id="tvSyncDot"></span><span id="tvSyncText">연결 중…</span></span>
    <span class="brand">PADEL SOCIETY</span>
    <span class="tvsync" id="tvUpdated"></span>
  </div>
</div>

<!-- ================= 점수 입력 시트 ================= -->
<div class="sheet-bg" id="sheetBg" onclick="closeSheet()"></div>
<div class="sheet" id="sheet">
  <h3 id="sheetTitle">MATCH 1</h3>
  <div class="scorerow">
    <span class="tname" id="edNameA"></span>
    <div class="stepper">
      <button onclick="bump('a',-1)">−</button>
      <input class="snum" id="numA" type="number" inputmode="numeric" min="0">
      <button onclick="bump('a',1)">＋</button>
    </div>
  </div>
  <div class="scorerow">
    <span class="tname" id="edNameB"></span>
    <div class="stepper">
      <button onclick="bump('b',-1)">−</button>
      <input class="snum" id="numB" type="number" inputmode="numeric" min="0">
      <button onclick="bump('b',1)">＋</button>
    </div>
  </div>
  <div class="sumline">
    합계 <span id="sumNow">16</span> / <span id="sumTarget">16</span>
    <button class="linkbtn on" id="linkBtn" onclick="toggleLink()">🔗 자동 채우기</button>
  </div>
  <div class="sheetbtns">
    <button class="btn-cancel" onclick="closeSheet()">취소</button>
    <button class="btn-del" id="delBtn" onclick="deleteScore()">삭제</button>
    <button class="btn-save" onclick="saveScore()">저장</button>
  </div>
</div>

<!-- ================= 설정 시트 ================= -->
<button class="gear" onclick="openSettings()">⚙️</button>
<div class="sheet settings" id="setSheet">
  <h3>설정</h3>
  <div class="row"><span>방 코드 (폰·TV 동일하게)</span><input type="text" id="setRoom"></div>
  <div class="row"><span>경기당 총 점수 (서브 4개 = 16점)</span><input type="number" id="setTotal" min="4" max="64"></div>
  <div class="sheetbtns">
    <button class="btn-cancel" onclick="closeSettings(false)">취소</button>
    <button class="btn-save" onclick="closeSettings(true)">적용</button>
  </div>
  <button class="btn-danger" onclick="resetAll()">⚠️ 전체 점수 초기화</button>
</div>

<script>
/* ================= 데이터 ================= */
const TEAMS = [
  {n:"은영 · 진용", c:"#E8C05A"},
  {n:"나래 · 안규", c:"#8FC7B4"},
  {n:"현정 · 광운", c:"#E09A85"},
  {n:"유나 · 준우", c:"#A3C585"},
  {n:"수정 · 준석", c:"#BFA0DC"},
  {n:"우석 · 리나", c:"#CDBE62"},
];
// 포스터 순서 그대로 (팀 인덱스)
const MATCHES = [
  [0,1],[2,5],[3,4],[0,5],[1,4],
  [2,3],[0,4],[5,3],[1,2],[0,3],
  [4,2],[5,1],[0,2],[3,1],[4,5],
];
// 스케줄 (시간, 제목, 설명) — TV 통합 모드에서 표시
const SCHEDULE = [
  ["14:00","입장","대관비 · 순서 선정 · 마니또 제출"],
  ["14:30","원래 부부 매치","음주 시작"],
  ["16:30","가짜 부부 팀 선정","음식 주문"],
  ["17:00","가짜 부부 매치","빠델 with 술·음식"],
  ["19:00","매치 종료","마니또 선물 공개"],
  ["19:30","뒷정리","남자들: 바닥 청소"],
  ["20:00","해산",""],
];

/* ================= 상태 ================= */
const params = new URLSearchParams(location.search);
let state = { rev:0, total:16, scores:{} };   // scores: {"0":[9,7], ...}
let room = params.get("room") || localStorage.getItem("pc_room") || "0703";
// 모드: tv=1 스코어보드 / tv=2 스코어보드+스케줄 / 없으면 입력
let tvMode, tvSchedule;
(function(){
  const p = params.get("tv"), saved = localStorage.getItem("pc_tv");
  if(p==="2"){ tvMode=true; tvSchedule=true; }
  else if(p==="1"){ tvMode=true; tvSchedule=false; }
  else { tvMode = (saved==="1"||saved==="2"); tvSchedule = (saved==="2"); }
})();
let lastChange = 0;   // 데이터가 마지막으로 바뀐 시각 (진단용)

function loadLocal(){
  try{ const s = JSON.parse(localStorage.getItem("pc_state_"+room)); if(s && typeof s.rev==="number") state = s; }catch(e){}
}
function saveLocal(){ localStorage.setItem("pc_state_"+room, JSON.stringify(state)); }
loadLocal();

/* ================= 동기화 (공개 MQTT 브로커) ================= */
const BROKERS = ["wss://broker.emqx.io:8084/mqtt","wss://broker.hivemq.com:8884/mqtt"];
let client=null, brokerIdx=0, gotRemote=false;
const topic = () => "padelsociety/couple/" + room + "/state";

function setSync(on, text){
  document.getElementById("syncDot").className = "dot " + (on?"on":"off");
  document.getElementById("syncText").textContent = text;
  const td = document.getElementById("tvSyncDot"), tt = document.getElementById("tvSyncText");
  if(td) td.className = "tvdot " + (on?"on":"off");
  if(tt) tt.textContent = text;
}
function connectSync(){
  if(typeof mqtt === "undefined"){ setSync(false,"오프라인 · 이 기기에만 저장"); return; }
  if(client){ try{client.end(true);}catch(e){} client=null; }
  gotRemote = false;
  setSync(false,"연결 중…");
  const c = mqtt.connect(BROKERS[brokerIdx], {
    clientId: "pc_" + Math.random().toString(16).slice(2,10),
    reconnectPeriod: 3000, connectTimeout: 8000, clean: true,
  });
  client = c;
  c.on("connect", ()=>{
    setSync(true, "실시간 연결됨 · 방 " + room);
    c.subscribe(topic());
    // 2초 안에 유지 메시지가 없고 내 점수가 있으면 내 상태를 올림
    setTimeout(()=>{ if(!gotRemote && state.rev>0) publish(); }, 2000);
  });
  c.on("message", (t, msg)=>{
    try{
      const remote = JSON.parse(msg.toString());
      if(typeof remote.rev==="number" && remote.rev > state.rev){
        state = remote; gotRemote = true; lastChange = Date.now(); saveLocal(); render();
      } else { gotRemote = true; }
    }catch(e){}
  });
  c.on("close", ()=> setSync(false,"재연결 중…"));
  c.on("error", ()=>{
    // 다음 브로커로 폴백
    brokerIdx = (brokerIdx+1) % BROKERS.length;
    try{c.end(true);}catch(e){}
    setTimeout(connectSync, 1500);
  });
}
function publish(){
  saveLocal();
  if(client && client.connected){
    client.publish(topic(), JSON.stringify(state), {retain:true, qos:1});
  }
}
function commit(mutate){
  mutate();
  state.rev = Math.max(state.rev+1, Date.now());
  lastChange = Date.now();
  publish(); render();
}

/* mqtt.js CDN 로드 (실패해도 로컬 동작) */
(function(){
  const urls = ["https://cdn.jsdelivr.net/npm/mqtt@5/dist/mqtt.min.js","https://unpkg.com/mqtt@5/dist/mqtt.min.js"];
  let i=0;
  function tryLoad(){
    if(i>=urls.length){ setSync(false,"오프라인 · 이 기기에만 저장"); return; }
    const s = document.createElement("script");
    s.src = urls[i++]; s.onload = connectSync; s.onerror = tryLoad;
    document.head.appendChild(s);
  }
  tryLoad();
})();

/* ================= 계산 (구글시트 순위표 로직) =================
   승점 = 승×3  |  득실차 = 총득점-총실점
   순위 = ① 승점  ② 득실차  (동점 시 같은 순위) */
function standings(){
  const rows = TEAMS.map((t,i)=>({i, name:t.n, c:t.c, played:0, win:0, loss:0, draw:0, mp:0, gf:0, ga:0, gd:0}));
  MATCHES.forEach((m,mi)=>{
    const sc = state.scores[mi]; if(!sc) return;
    const [a,b] = sc, [ta,tb] = m;
    rows[ta].played++; rows[tb].played++;
    rows[ta].gf+=a; rows[tb].gf+=b;          // 총득점
    rows[ta].ga+=b; rows[tb].ga+=a;          // 총실점
    if(a>b){ rows[ta].win++; rows[tb].loss++; }
    else if(b>a){ rows[tb].win++; rows[ta].loss++; }
    else { rows[ta].draw++; rows[tb].draw++; }
  });
  rows.forEach(r=>{ r.mp = r.win*3; r.gd = r.gf - r.ga; });
  // 순위: 승점 > 득실차 (구글시트 COUNTIFS 방식, 동점은 같은 순위)
  rows.forEach(r=>{ r.rank = rows.filter(o=>o.mp>r.mp).length
                           + rows.filter(o=>o.mp===r.mp && o.gd>r.gd).length + 1; });
  // 표시 정렬: 승점 → 득실차 → 총득점
  rows.sort((x,y)=> y.mp-x.mp || y.gd-x.gd || y.gf-x.gf);
  return rows;
}
const doneCount = () => Object.keys(state.scores).length;
const nowIdx = () => MATCHES.findIndex((_,i)=> !state.scores[i]);

/* ================= 렌더 (폰) ================= */
function teamTag(i, extra){
  const t = TEAMS[i];
  return '<span class="tname'+(extra||'')+'" style="border-color:'+t.c+';color:'+t.c+'">'+t.n+'</span>';
}
function render(){
  document.body.classList.toggle("tv", tvMode);
  document.body.classList.toggle("tv-sched", tvSchedule);
  const done = doneCount();
  document.getElementById("progText").textContent = done + " / " + MATCHES.length + " 완료";

  // 순위표
  const rows = standings();
  const anyPlayed = rows.some(r=>r.played>0);
  let h = "<tr><th>순위</th><th style='text-align:left'>팀</th><th>경기</th><th>승</th><th>패</th>"
        + "<th>승점</th><th>득점</th><th>실점</th><th>득실</th></tr>";
  rows.forEach((r)=>{
    const gdCls = r.gd>0?"gd-pos":(r.gd<0?"gd-neg":"");
    h += "<tr class='"+(r.rank===1&&anyPlayed?"rank1":"")+"'><td>"+r.rank+"</td>"
      + "<td class='teamcell'><span class='chip' style='background:"+r.c+"'></span>"+r.name+"</td>"
      + "<td>"+r.played+"</td><td>"+r.win+"</td><td>"+r.loss+"</td>"
      + "<td class='mp'>"+r.mp+"</td><td>"+r.gf+"</td><td>"+r.ga+"</td>"
      + "<td class='"+gdCls+"'>"+(r.gd>0?"+":"")+r.gd+"</td></tr>";
  });
  document.getElementById("standTable").innerHTML = h;

  // 링크에 방 코드 유지
  const pl = document.getElementById("partnerLink");
  if(pl) pl.href = "partner.html?room=" + encodeURIComponent(room);
  const il = document.getElementById("infoLink");
  if(il) il.href = "info.html?room=" + encodeURIComponent(room);

  // 경기 리스트
  const ni = nowIdx();
  let mh = "";
  MATCHES.forEach((m,i)=>{
    const sc = state.scores[i];
    const cls = sc ? "done" : (i===ni ? "now" : "");
    const score = sc
      ? "<span class='"+(sc[0]>sc[1]?"winner":"")+"'>"+sc[0]+"</span> : <span class='"+(sc[1]>sc[0]?"winner":"")+"'>"+sc[1]+"</span>"
      : "<span class='empty'>"+(i===ni?"▶ 진행":"입력")+"</span>";
    mh += "<button class='match "+cls+"' onclick='openSheet("+i+")'>"
      + "<span class='mno'>"+(i+1)+"</span>"
      + "<span class='mteams'>"+teamTag(m[0])+"<span class='vs'>◇</span>"+teamTag(m[1])+"</span>"
      + "<span class='mscore'>"+score+"</span></button>";
  });
  document.getElementById("matchList").innerHTML = mh;

  if(tvMode){ renderTV(rows, ni, done); if(tvSchedule) renderSchedule(); }
}

/* ================= 스케줄 (TV 통합 모드) ================= */
function renderSchedule(){
  const el = document.getElementById("tvSchedList");
  if(!el) return;
  const d = new Date(), mins = d.getHours()*60 + d.getMinutes();
  const toMin = s => { const p=s.split(":"); return (+p[0])*60 + (+p[1]); };
  let curIdx = -1;
  SCHEDULE.forEach((s,i)=>{ if(toMin(s[0]) <= mins) curIdx = i; });
  let h = "";
  SCHEDULE.forEach((s,i)=>{
    const cls = i===curIdx ? "now" : (i<curIdx ? "past" : "");
    h += "<div class='tvsi "+cls+"'><span class='tm'>"+s[0]+"</span>"
      + "<span class='bd'><div class='tt'>"+s[1]+"</div>"
      + (s[2] ? "<div class='td'>"+s[2]+"</div>" : "") + "</span></div>";
  });
  el.innerHTML = h;
}

/* ================= 렌더 (TV) ================= */
function renderTV(rows, ni, done){
  document.getElementById("tvProgLeft").textContent = done + " / " + MATCHES.length + " 경기 완료";
  document.getElementById("tvProgBar").style.width = (done/MATCHES.length*100) + "%";

  const anyPlayed = rows.some(r=>r.played>0);
  let sh = "<div class='tvsrow head'><span></span><span class='nm'>팀</span>"
    + "<span>경기</span><span>승</span><span>패</span><span class='mp'>승점</span>"
    + "<span>득점</span><span>실점</span><span>득실</span></div>";
  rows.forEach((r)=>{
    const gdCls = r.gd>0?"gd-pos":(r.gd<0?"gd-neg":"");
    sh += "<div class='tvsrow "+(r.rank===1&&anyPlayed?"r1":"")+"'>"
      + "<span class='rk'>"+r.rank+"</span>"
      + "<span class='nm'><span class='chip' style='background:"+r.c+"'></span>"+r.name+"</span>"
      + "<span>"+r.played+"</span><span>"+r.win+"</span><span>"+r.loss+"</span>"
      + "<span class='mp'>"+r.mp+"</span><span>"+r.gf+"</span><span>"+r.ga+"</span>"
      + "<span class='"+gdCls+"'>"+(r.gd>0?"+":"")+r.gd+"</span></div>";
  });
  document.getElementById("tvStand").innerHTML = sh;

  const nowEl = document.getElementById("tvNow");
  if(ni === -1){
    const champ = rows[0];
    nowEl.innerHTML = "<div class='champ'><small>CHAMPION</small>🏆 "+champ.name
      + "<small style='margin-top:.6vh'>"+champ.win+"승 · 승점 "+champ.mp+" · 득실 "+(champ.gd>0?"+":"")+champ.gd+"</small></div>";
  }else{
    const m = MATCHES[ni];
    nowEl.innerHTML = "<div class='label'>NOW PLAYING</div>"
      + "<div class='teams'>"+teamTag(m[0])+"<span class='vs'>◇</span>"+teamTag(m[1])+"</div>"
      + "<div class='mn'>MATCH "+(ni+1)+" / "+MATCHES.length+"</div>";
  }

  // 결과+예정 리스트: 최근 결과 위주로, 현재 경기 주변을 보여줌
  let lh = "";
  MATCHES.forEach((m,i)=>{
    const sc = state.scores[i];
    const sc2 = sc ? sc[0]+" : "+sc[1] : (i===ni ? "▶" : "·");
    lh += "<div class='item'><span class='no'>"+(i+1)+"</span>"
      + "<span class='t'>"+teamTag(m[0])+" <span class='vs'>◇</span> "+teamTag(m[1])+"</span>"
      + "<span class='sc'>"+sc2+"</span></div>";
  });
  document.getElementById("tvList").innerHTML = lh;
  // 현재 경기가 보이도록 스크롤
  const list = document.getElementById("tvList");
  const target = list.children[Math.max(0,(ni===-1?MATCHES.length-1:ni)-2)];
  if(target) list.scrollTop = target.offsetTop - list.offsetTop;
}
setInterval(()=>{
  const el = document.getElementById("tvClock");
  if(el){ const d=new Date(); el.textContent = String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0"); }
  const up = document.getElementById("tvUpdated");
  if(up){
    if(lastChange){
      const s = Math.round((Date.now()-lastChange)/1000);
      up.textContent = "🔄 " + (s<2 ? "방금 갱신" : s<60 ? s+"초 전 갱신" : Math.floor(s/60)+"분 전 갱신");
    } else up.textContent = "";
  }
  if(tvSchedule) renderSchedule();
},1000);

/* ================= 모드 ================= */
function setMode(view){   // "input" | "score" | "full"
  tvMode = (view !== "input");
  tvSchedule = (view === "full");
  localStorage.setItem("pc_tv", view==="full" ? "2" : view==="score" ? "1" : "0");
  document.querySelectorAll(".modeswitch button").forEach(b=> b.classList.toggle("active", b.dataset.mode===view));
  render();
  if(tvMode && document.documentElement.requestFullscreen){ document.documentElement.requestFullscreen().catch(()=>{}); }
}
// TV모드에서 화면 아무데나 두 번 탭 → 입력모드 복귀
let lastTap=0;
document.querySelector(".tvwrap").addEventListener("click", ()=>{
  const now = Date.now();
  if(now-lastTap<400){ setMode("input"); if(document.fullscreenElement) document.exitFullscreen().catch(()=>{}); }
  lastTap = now;
});

/* 화면 꺼짐 방지 */
let wakeLock=null;
async function keepAwake(){
  try{ if("wakeLock" in navigator) wakeLock = await navigator.wakeLock.request("screen"); }catch(e){}
}
document.addEventListener("visibilitychange", ()=>{ if(!document.hidden) keepAwake(); });
document.addEventListener("click", keepAwake, {once:true});

/* ================= 점수 입력 ================= */
let editIdx=-1, linked=true;
const $ = id => document.getElementById(id);
function openSheet(i){
  if(tvMode) return;
  editIdx = i;
  const m = MATCHES[i], sc = state.scores[i];
  $("sheetTitle").textContent = "MATCH " + (i+1);
  $("edNameA").outerHTML = teamTag(m[0]).replace("<span","<span id='edNameA'");
  $("edNameB").outerHTML = teamTag(m[1]).replace("<span","<span id='edNameB'");
  const half = Math.floor(state.total/2);
  $("numA").value = sc ? sc[0] : half;
  $("numB").value = sc ? sc[1] : state.total-half;
  $("delBtn").style.display = sc ? "" : "none";
  $("sumTarget").textContent = state.total;
  updateSum();
  $("sheetBg").classList.add("open"); $("sheet").classList.add("open");
}
function closeSheet(){ $("sheetBg").classList.remove("open"); $("sheet").classList.remove("open"); }
function bump(side, d){
  const el = side==="a" ? $("numA") : $("numB");
  const other = side==="a" ? $("numB") : $("numA");
  let v = Math.max(0, (parseInt(el.value)||0) + d);
  el.value = v;
  if(linked) other.value = Math.max(0, state.total - v);
  updateSum();
}
$("numA").addEventListener("input", ()=>{ if(linked) $("numB").value=Math.max(0,state.total-(parseInt($("numA").value)||0)); updateSum(); });
$("numB").addEventListener("input", ()=>{ if(linked) $("numA").value=Math.max(0,state.total-(parseInt($("numB").value)||0)); updateSum(); });
function toggleLink(){ linked=!linked; $("linkBtn").classList.toggle("on", linked); }
function updateSum(){
  const s = (parseInt($("numA").value)||0)+(parseInt($("numB").value)||0);
  $("sumNow").innerHTML = "<span class='"+(s===state.total?"good":"bad")+"'>"+s+"</span>";
}
function saveScore(){
  if(editIdx < 0) return closeSheet();
  const a = parseInt($("numA").value)||0, b = parseInt($("numB").value)||0;
  commit(()=>{ state.scores[editIdx] = [a,b]; });
  closeSheet();
}
function deleteScore(){
  if(editIdx < 0) return closeSheet();
  commit(()=>{ delete state.scores[editIdx]; });
  closeSheet();
}

/* ================= 설정 ================= */
function openSettings(){
  $("setRoom").value = room; $("setTotal").value = state.total;
  $("sheetBg").classList.add("open"); $("setSheet").classList.add("open");
  $("sheetBg").onclick = ()=>closeSettings(false);
}
function closeSettings(apply){
  if(apply){
    const newRoom = $("setRoom").value.trim() || room;
    const newTotal = Math.max(4, parseInt($("setTotal").value)||16);
    if(newRoom !== room){
      room = newRoom; localStorage.setItem("pc_room", room);
      loadLocal(); connectSync();
    }
    if(newTotal !== state.total) commit(()=>{ state.total = newTotal; });
  }
  $("sheetBg").classList.remove("open"); $("setSheet").classList.remove("open");
  $("sheetBg").onclick = closeSheet;
  render();
}
function resetAll(){
  if(!confirm("모든 경기 점수를 삭제할까요?")) return;
  commit(()=>{ state.scores = {}; });
  closeSettings(false);
}

/* ================= 시작 ================= */
(function(){
  const v = tvSchedule ? "full" : tvMode ? "score" : "input";
  document.querySelectorAll(".modeswitch button").forEach(b=> b.classList.toggle("active", b.dataset.mode===v));
})();
render();
